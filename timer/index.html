<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kritika's Timer</title>

  <link rel="stylesheet" href="styles.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Single:wght@100..900&family=Bitcount+Single+Ink:wght,CRSV@100..900,1&family=Pixelify+Sans&display=swap" rel="stylesheet">
  
</head>

<body>
  
  <div class="timer-card">

    <h1 class="timer-title">Kritika's Timer</h1>

    <div id="timeDisplay" class="time-display">
      00:00:00
    </div>

    <div class="timer-buttons">
      <button id="startBtn">Start</button>
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
    </div>

  </div>

<script src="script.js"></script>
</body>
</html>
